[[local|localrc]]

# Host networking
HOST_IP=192.168.0.105

# Global passwords
ADMIN_PASSWORD=Admin@OpenStack1
DATABASE_PASSWORD=Admin@OpenStack1
RABBIT_PASSWORD=Admin@OpenStack1
SERVICE_PASSWORD=Admin@OpenStack1

# Disable memory-heavy services that are out of scope
disable_service swift
disable_service heat
disable_service ceilometer
disable_service aodh

# Enable core EC2 services
enable_service keystone
enable_service glance
enable_service nova
enable_service neutron
enable_service cinder
enable_service horizon

# Use linuxbridge instead of Open vSwitch for WiFi compatibility
Q_AGENT=linuxbridge
Q_ML2_PLUGIN_MECHANISM_DRIVERS=linuxbridge
Q_ML2_TENANT_NETWORK_TYPE=vxlan
